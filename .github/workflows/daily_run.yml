name: Daily Web Scraper

on:
  schedule:
    - cron: '0 9 * * *' # Runs every day at 9:00 AM UTC

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 reportlab

      - name: Run Scraper
        run: python scraper_test.py  # Aquí se genera el PDF

      # ESTO CREA UN ENLACE DE DESCARGA EN LA PESTAÑA "ACTIONS"
      - name: Subir reporte como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: reporte-inmuebles-hoy
          path: "*.pdf"  # Sube todos los PDFs generados
          retention-days: 30  # Se borra automáticamente de GitHub en 30 días


